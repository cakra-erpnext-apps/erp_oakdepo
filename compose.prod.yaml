name: erp_oakdepo_prod

x-frappe-image: &frappe-image
  image: oakdepo-erpnext:prod
  pull_policy: never

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-depends-configurator: &depends-configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

x-app-volumes: &app-volumes
  - sites:/home/frappe/frappe-bench/sites
  - assets:/home/frappe/frappe-bench/assets
  - logs:/home/frappe/frappe-bench/logs
  - ./:/home/frappe/frappe-bench/apps/container_depot
  - egg-info:/home/frappe/frappe-bench/apps/container_depot/container_depot.egg-info
  - ./ensure-apps.sh:/scripts/ensure-apps.sh:ro

services:
  mariadb:
    image: mariadb:10.8
    restart: unless-stopped
    <<: *default-logging
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:?DB_ROOT_PASS not set in .env.prod}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    volumes:
      - mariadb-data:/var/lib/mysql
    networks: [frappe_net]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis-cache:
    image: redis:alpine
    restart: unless-stopped
    <<: *default-logging
    networks: [frappe_net]

  redis-queue:
    image: redis:alpine
    restart: unless-stopped
    <<: *default-logging
    networks: [frappe_net]

  configurator:
    <<: *frappe-image
    command: |
      bash -lc '
        set -e
        # container_depot is intentionally absent: `bench set-config` imports every
        # app listed here, and container_depot only exists via the bind mount +
        # `pip install -e` that create-site does -- this container has neither, so
        # listing it aborts the configurator with ModuleNotFoundError on a fresh
        # deploy. create-site writes the full nine-app list once it is installable,
        # and ensure-apps.sh re-appends it for the long-running services.
        echo -e "frappe\nerpnext\nhrms\ncrm\nhelpdesk\nraven\ngameplan\ntelephony" > sites/apps.txt
        bench set-config -g db_host mariadb
        bench set-config -g db_port 3306
        bench set-config -g redis_cache redis://redis-cache:6379
        bench set-config -g redis_queue redis://redis-queue:6379
        bench set-config -g redis_socketio redis://redis-cache:6379
        bench set-config -g socketio_port 9000
        echo "[configurator] Done."
      '
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - assets:/home/frappe/frappe-bench/assets
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      mariadb:
        condition: service_healthy
    networks: [frappe_net]

  create-site:
    <<: *frappe-image
    command: |
      bash -lc '
        set -e
        for i in $(seq 1 120); do (echo > /dev/tcp/mariadb/3306) >/dev/null 2>&1 && break; sleep 1; done
        echo "MariaDB ready"
        cd /home/frappe/frappe-bench
        env/bin/pip install -e apps/container_depot --no-deps -q
        echo -e "frappe\nerpnext\nhrms\ncrm\nhelpdesk\nraven\ngameplan\ntelephony\ncontainer_depot" > sites/apps.txt
        if [ ! -d "sites/${SITE_NAME}" ]; then
          bench new-site "${SITE_NAME}" --mariadb-user-host-login-scope="%" --db-root-password "${DB_ROOT_PASS}" --admin-password "${ADMIN_PASS}" --install-app erpnext
          bench --site "${SITE_NAME}" install-app hrms
          bench --site "${SITE_NAME}" install-app crm
          bench --site "${SITE_NAME}" install-app helpdesk
          bench --site "${SITE_NAME}" install-app raven
          bench --site "${SITE_NAME}" install-app gameplan
          bench --site "${SITE_NAME}" install-app telephony
          bench --site "${SITE_NAME}" install-app container_depot
          bench --site "${SITE_NAME}" migrate
          bench --site "${SITE_NAME}" set-config host_name "https://${SITE_NAME}"
          bench --site "${SITE_NAME}" set-config developer_mode 0
          bench build --production --apps frappe,erpnext,hrms,crm,helpdesk,raven,gameplan,telephony,container_depot
          # Nginx runs in a separate container. Frappe build creates symlinks in sites/assets,
          # but symlink targets do not exist inside nginx. Use physical copies.
          rm -rf sites/assets/frappe sites/assets/erpnext sites/assets/hrms sites/assets/crm sites/assets/helpdesk sites/assets/raven sites/assets/gameplan sites/assets/telephony sites/assets/container_depot
          mkdir -p /tmp/oakdepo_assets
          rm -rf /tmp/oakdepo_assets/frappe /tmp/oakdepo_assets/erpnext /tmp/oakdepo_assets/hrms /tmp/oakdepo_assets/crm /tmp/oakdepo_assets/helpdesk /tmp/oakdepo_assets/raven /tmp/oakdepo_assets/gameplan /tmp/oakdepo_assets/telephony /tmp/oakdepo_assets/container_depot
          cp -aL apps/frappe/frappe/public /tmp/oakdepo_assets/frappe
          cp -aL apps/erpnext/erpnext/public /tmp/oakdepo_assets/erpnext
          cp -aL apps/hrms/hrms/public /tmp/oakdepo_assets/hrms 2>/dev/null || true
          cp -aL apps/crm/crm/public /tmp/oakdepo_assets/crm 2>/dev/null || true
          cp -aL apps/helpdesk/helpdesk/public /tmp/oakdepo_assets/helpdesk 2>/dev/null || true
          cp -aL apps/raven/raven/public /tmp/oakdepo_assets/raven 2>/dev/null || true
          cp -aL apps/gameplan/gameplan/public /tmp/oakdepo_assets/gameplan 2>/dev/null || true
          cp -aL apps/telephony/telephony/public /tmp/oakdepo_assets/telephony 2>/dev/null || true
          cp -aL apps/container_depot/container_depot/public /tmp/oakdepo_assets/container_depot
          mv /tmp/oakdepo_assets/frappe sites/assets/frappe
          mv /tmp/oakdepo_assets/erpnext sites/assets/erpnext
          mv /tmp/oakdepo_assets/hrms sites/assets/hrms 2>/dev/null || true
          mv /tmp/oakdepo_assets/crm sites/assets/crm 2>/dev/null || true
          mv /tmp/oakdepo_assets/helpdesk sites/assets/helpdesk 2>/dev/null || true
          mv /tmp/oakdepo_assets/raven sites/assets/raven 2>/dev/null || true
          mv /tmp/oakdepo_assets/gameplan sites/assets/gameplan 2>/dev/null || true
          mv /tmp/oakdepo_assets/telephony sites/assets/telephony 2>/dev/null || true
          mv /tmp/oakdepo_assets/container_depot sites/assets/container_depot
          cp -rL apps/container_depot/frontend/dist sites/assets/container_depot/frontend 2>/dev/null || true
          echo "[create-site] Done."
        else
          echo "[create-site] Site exists — skip creation."
        fi
      '
    environment:
      SITE_NAME: ${SITE_NAME:?SITE_NAME not set in .env.prod}
      DB_ROOT_PASS: ${DB_ROOT_PASS:?DB_ROOT_PASS not set in .env.prod}
      ADMIN_PASS: ${ADMIN_PASS:?ADMIN_PASS not set in .env.prod}
    volumes: *app-volumes
    depends_on:
      configurator:
        condition: service_completed_successfully
    networks: [frappe_net]

  backend:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command: |
      bash -lc 'bash /scripts/ensure-apps.sh bash -lc "cd /home/frappe/frappe-bench && ./env/bin/gunicorn --chdir=/home/frappe/frappe-bench/sites --bind=0.0.0.0:8000 --threads=4 --workers=2 --worker-class=gthread --worker-tmp-dir=/dev/shm --timeout=120 frappe.app:application"'
    volumes: *app-volumes
    networks: [frappe_net]

  websocket:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command: bash -lc 'cd /home/frappe/frappe-bench && node apps/frappe/socketio.js'
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - assets:/home/frappe/frappe-bench/assets
      - logs:/home/frappe/frappe-bench/logs
    networks: [frappe_net]

  queue-short:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command: bash -lc 'bash /scripts/ensure-apps.sh bash -lc "cd /home/frappe/frappe-bench && bench worker --queue short,default"'
    volumes: *app-volumes
    networks: [frappe_net]

  queue-long:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command: bash -lc 'bash /scripts/ensure-apps.sh bash -lc "cd /home/frappe/frappe-bench && bench worker --queue long"'
    volumes: *app-volumes
    networks: [frappe_net]

  scheduler:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command: bash -lc 'bash /scripts/ensure-apps.sh bash -lc "cd /home/frappe/frappe-bench && bench schedule"'
    volumes: *app-volumes
    networks: [frappe_net]

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    <<: *default-logging
    ports:
      - "127.0.0.1:18088:80"
    volumes:
      - sites:/home/frappe/frappe-bench/sites:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
    networks: [frappe_net]

volumes:
  mariadb-data:
  sites:
  assets:
  logs:
  egg-info:

networks:
  frappe_net:
    driver: bridge
